services:
  db:
    image: postgres:17
    container_name: web001-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-web_store}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-web_store}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web001-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.server
    environment:
      DATABASE_ENGINE: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/').read()\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: web001-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - public

volumes:
  postgres_data:
