{% extends "base.html" %}

{% block title %}商家登录 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Merchant Access</p>
        <h1>登录商家后台</h1>
        <p class="muted">仅商家账号可从这里进入后台。普通用户账号请返回商城登录页。</p>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <label class="field">
                    <span>{{ field.label }}</span>
                    {% if field.name == "captcha" %}
                        <div class="inline-field">
                            {{ field }}
                            <button type="button" class="captcha-box captcha-box--button" id="refresh-captcha-button">{{ captcha_value }}</button>
                        </div>
                        <small class="muted">点击右侧验证码即可刷新。</small>
                    {% else %}
                        {{ field }}
                    {% endif %}
                    {% if field.errors %}
                        <small class="error-text">{{ field.errors|join:", " }}</small>
                    {% endif %}
                </label>
            {% endfor %}
            <button type="submit" class="primary-button">进入商家后台</button>
        </form>
        <p class="muted">普通用户？<a href="{% url 'accounts:login' %}">返回商城登录</a></p>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const refreshButton = document.getElementById("refresh-captcha-button");
    if (!refreshButton) {
        return;
    }

    refreshButton.addEventListener("click", async function () {
        refreshButton.disabled = true;
        try {
            const response = await fetch("{% url 'accounts:login_captcha' %}");
            const data = await response.json();
            if (data.ok && data.captcha) {
                refreshButton.textContent = data.captcha;
            }
        } finally {
            refreshButton.disabled = false;
        }
    });
});
</script>
{% endblock %}
